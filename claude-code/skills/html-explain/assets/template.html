<!DOCTYPE html>
<!--
  html-explain 담백 스킨 골격 (self-contained). 채울 곳:
   {{TITLE}} {{SUBTITLE}} {{TOC_ITEMS}} {{MAIN}}
  레이아웃: 사이드바(왼쪽 끝 고정) + 본문(풀폭). 가운데 정렬 아님.
  규칙: 담백 고정(색 배경 박스·hero·화려 컴포넌트 금지) · 이모지 금지 ·
        affordance 정직(정적은 텍스트, 동작은 button/a) · 접근성(키보드 포커스·색+텍스트·대비).
  컴포넌트는 components.md 참조. TOC 항목은 <li><a href="#s-id">제목</a></li>, 섹션은 <section class="s" id="s-id">.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f7f8fa; --bg-elev: #ffffff; --bg-elev-2: #f3f4f6;
  --border: #e5e7eb; --border-hi: #d1d5db;
  --text: #111827; --text-dim: #4b5563; --text-faint: #9ca3af;
  --accent: #1b64da; --accent-soft: #eaf2ff;
  --ok: #047857; --ok-bg: rgba(5,150,105,0.10);
  --warn: #b45309; --warn-bg: rgba(217,119,6,0.10);
  --danger: #b91c1c; --danger-bg: rgba(220,38,38,0.09);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --sans: 'Pretendard Variable','Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.65; display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; -webkit-font-smoothing: antialiased; }
::selection { background: var(--accent-soft); }
a { color: inherit; text-decoration: none; }

/* reading progress bar */
#progress { position: fixed; top: 0; left: 0; height: 2px; width: 0; background: var(--text-dim); z-index: 100; transition: width 0.08s linear; }

/* sidebar (왼쪽 끝 고정) */
aside { position: sticky; top: 0; max-height: 100vh; overflow-y: auto; background: var(--bg-elev); border-right: 1px solid var(--border); padding: 26px 18px; }
aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); margin-bottom: 14px; font-weight: 600; }
aside nav { display: block; }
aside a { color: var(--text-dim); text-decoration: none; font-size: 13.5px; display: block; padding: 7px 11px; border-radius: 6px; border-left: 2px solid transparent; transition: background 0.15s, color 0.15s; }
aside a:hover { background: var(--bg-elev-2); color: var(--text); }
aside a.current { background: var(--bg-elev-2); color: var(--text); border-left-color: var(--border-hi); }

/* main (풀폭) */
main { padding: 40px 56px 90px; max-width: 1080px; min-width: 0; }
header.doc { margin-bottom: 40px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
header.doc h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 10px; }
header.doc .meta { font-size: 13px; color: var(--text-dim); font-family: var(--mono); line-height: 1.7; }
header.doc .meta b { color: var(--text); }

/* sections */
section.s { margin-bottom: 52px; scroll-margin-top: 22px; }
section.s > h2 { font-size: 21px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 12px; }

/* 섹션 핵심 요약 (담백 — 배경 없이 좌측 선) */
.sec-summary { border-left: 2px solid var(--border-hi); padding: 2px 0 2px 16px; margin-bottom: 24px; font-size: 15px; color: var(--text-dim); line-height: 1.68; }
.sec-summary::before { content: '요약'; display: block; font-size: 11px; font-weight: 700; color: var(--text-faint); margin-bottom: 4px; letter-spacing: 0.03em; }

/* 항목 (카드 아님 — 구분선) */
.item { border-bottom: 1px solid var(--border); padding: 22px 0; }
.item:last-child { border-bottom: none; }
.item-id { font-family: var(--mono); font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 4px; }
.item-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

/* 본문 */
.item-body { color: var(--text-dim); font-size: 14.5px; line-height: 1.7; }
.item-body b, .item-body strong { color: var(--text); font-weight: 600; }
.item-body p { margin-bottom: 8px; } .item-body p:last-child { margin-bottom: 0; }
.item-body ul, .item-body ol { margin: 6px 0 6px 20px; } .item-body li { margin-bottom: 5px; }
.item-body code { background: var(--bg-elev-2); padding: 2px 5px; border-radius: 3px; font-family: var(--mono); font-size: 12.5px; color: var(--text); }
.item-body pre { background: var(--bg-elev-2); padding: 12px; border-radius: 6px; margin: 8px 0; overflow-x: auto; font-family: var(--mono); font-size: 12px; line-height: 1.5; border: 1px solid var(--border); }

/* 표 (데이터 밀집일 때만) */
.item-body table, table.tbl { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12.5px; }
.item-body th, .item-body td, table.tbl th, table.tbl td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top; }
.item-body th, table.tbl th { background: var(--bg-elev-2); font-weight: 600; color: var(--text); }
td.c, .item-body td.c { text-align: center; font-weight: 700; }
.ok-m { color: var(--ok); font-weight: 800; } .x-m { color: var(--danger); font-weight: 800; }
.co-m { color: var(--warn); font-weight: 800; } .na-m { color: var(--text-faint); font-weight: 700; }

/* 난이도·등급 (텍스트, 배경 없음) */
.lv { font-size: 12px; font-weight: 700; margin-left: 2px; white-space: nowrap; }
.lv.mid { color: var(--text-dim); } .lv.hi { color: var(--warn); } .lv.top { color: var(--danger); }

/* 접기 (어떻게) */
.item-body details { margin: 10px 0 2px; border-top: 1px solid var(--border); padding-top: 8px; }
.item-body summary { cursor: pointer; font-size: 13px; font-weight: 600; color: var(--accent); list-style: none; user-select: none; outline: none; }
.item-body summary::-webkit-details-marker { display: none; }
.item-body summary::before { content: '\25B6\00A0'; font-size: 10px; }
.item-body details[open] summary::before { content: '\25BC\00A0'; }
.item-body details > *:not(summary) { padding-top: 8px; }

/* 콜아웃 (담백 — 좌측 선만) */
.cal { border-left: 2px solid var(--border-hi); padding: 2px 0 2px 14px; margin: 14px 0; font-size: 13.5px; line-height: 1.62; }
.cal b { color: var(--text); }
.cal.warn { border-left-color: var(--warn); } .cal.warn::before { content: '주의'; display:block; font-size:10.5px; font-weight:700; color: var(--warn); margin-bottom:3px; letter-spacing:.03em; }
.cal.danger { border-left-color: var(--danger); } .cal.danger::before { content: '중요'; display:block; font-size:10.5px; font-weight:700; color: var(--danger); margin-bottom:3px; letter-spacing:.03em; }
.cal.ok { border-left-color: var(--border-hi); } .cal.ok::before { content: '정리'; display:block; font-size:10.5px; font-weight:700; color: var(--text-faint); margin-bottom:3px; letter-spacing:.03em; }

/* 용어 사전 (담백) */
.item-glossary { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
.item-glossary::before { content: '용어'; display: block; font-size: 11px; font-weight: 700; color: var(--text-faint); margin-bottom: 8px; letter-spacing: 0.03em; }
.item-glossary dl { display: grid; grid-template-columns: auto 1fr; gap: 8px 14px; font-size: 13px; }
.item-glossary dt { font-weight: 700; color: var(--text); white-space: nowrap; padding-top: 2px; }
.item-glossary dd { color: var(--text-dim); line-height: 1.55; }

/* 용어 툴팁 (hover + 키보드 포커스, 자동 링크 겸용) */
.term { border-bottom: 1px dotted var(--text-faint); cursor: help; position: relative; outline: none; }
.term:hover, .term:focus-visible { border-bottom-color: var(--text-dim); background: var(--bg-elev-2); border-radius: 2px; }
.term:hover::after, .term:focus-visible::after { content: attr(data-tip); position: absolute; left: 0; top: calc(100% + 8px); z-index: 60; width: max-content; max-width: 300px; background: var(--text); color: #fff; font-weight: 400; font-size: 12.5px; line-height: 1.55; letter-spacing: 0; padding: 9px 12px; border-radius: 7px; box-shadow: var(--shadow-md); white-space: normal; pointer-events: none; }
.term:hover::before, .term:focus-visible::before { content: ''; position: absolute; left: 13px; top: calc(100% + 3px); border: 5px solid transparent; border-bottom-color: var(--text); z-index: 61; pointer-events: none; }

footer { margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-faint); line-height: 1.7; }
footer b { color: var(--text-dim); }

@media (max-width: 900px) {
  body { grid-template-columns: 1fr; }
  aside { position: static; max-height: none; }
  main { padding: 24px 20px 60px; }
  .item-glossary dl { grid-template-columns: 1fr; gap: 2px 0; }
  .item-glossary dt { padding-top: 8px; }
}
@media (prefers-reduced-motion: reduce){ * { transition: none !important; scroll-behavior: auto; } }
</style>
</head>
<body>
<div id="progress" aria-hidden="true"></div>
<aside>
  <h2>Sections</h2>
  <nav id="toc">{{TOC_ITEMS}}</nav>
</aside>
<main>
  <header class="doc">
    <h1>{{TITLE}}</h1>
    <div class="meta">{{SUBTITLE}}</div>
  </header>
  {{MAIN}}
</main>
<script>
  // scroll-spy TOC (위치 기반 + 클릭 lock)
  var links = {};
  document.querySelectorAll('#toc a').forEach(function(a){ links[a.getAttribute('href').slice(1)] = a; });
  function setCur(id){ Object.values(links).forEach(function(l){ l.classList.remove('current'); }); if (links[id]) links[id].classList.add('current'); }
  var secs = document.querySelectorAll('main section.s'), lock = 0;
  function activeId(){ var line = Math.min(160, window.innerHeight * 0.28), id = secs.length ? secs[0].id : null; secs.forEach(function(s){ if (s.getBoundingClientRect().top <= line) id = s.id; }); if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 2 && secs.length) id = secs[secs.length - 1].id; return id; }
  function onScroll(){ if (Date.now() < lock) return; setCur(activeId()); }
  document.querySelectorAll('#toc a').forEach(function(a){ a.addEventListener('click', function(){ setCur(a.getAttribute('href').slice(1)); lock = Date.now() + 800; }); });
  window.addEventListener('scroll', onScroll, { passive: true });

  // 진행바
  function setupProgress(){ var prog = document.getElementById('progress'); if (!prog) return; function upd(){ var h = document.documentElement.scrollHeight - window.innerHeight; prog.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%'; } window.addEventListener('scroll', upd, { passive: true }); window.addEventListener('resize', upd); upd(); }

  // 용어 자동 링크 (.item-glossary 에서 수집 → 본문 첫 등장에만 밑줄·툴팁)
  function linkifyTerms(){ var TERMS = {}; document.querySelectorAll('.item-glossary dl').forEach(function(dl){ var dts = dl.querySelectorAll('dt'), dds = dl.querySelectorAll('dd'); for (var i = 0; i < dts.length; i++){ if (dds[i]){ var k = dts[i].textContent.trim(); if (k) TERMS[k] = dds[i].textContent.trim(); } } }); var keys = Object.keys(TERMS); if (!keys.length) return; keys.sort(function(a,b){ return b.length - a.length; }); var seen = {}, main = document.querySelector('main'); if (!main) return; var walker = document.createTreeWalker(main, NodeFilter.SHOW_TEXT, { acceptNode: function(node){ if (!node.nodeValue.trim()) return NodeFilter.FILTER_REJECT; var p = node.parentElement; while (p && p !== main){ var t = p.tagName; if (t==='CODE'||t==='SUMMARY'||t==='A'||t==='H1'||t==='H2'||t==='H3'||p.classList.contains('term')||p.classList.contains('item-glossary')||p.classList.contains('sec-summary')||p.classList.contains('item-title')||p.classList.contains('item-id')) return NodeFilter.FILTER_REJECT; p = p.parentElement; } return NodeFilter.FILTER_ACCEPT; } }); var nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode); nodes.forEach(function(node){ var text = node.nodeValue, best = -1, bestKey = null; for (var i = 0; i < keys.length; i++){ if (seen[keys[i]]) continue; var idx = text.indexOf(keys[i]); if (idx === -1) continue; if (best === -1 || idx < best || (idx === best && keys[i].length > bestKey.length)){ best = idx; bestKey = keys[i]; } } if (bestKey === null) return; var before = text.slice(0, best), after = text.slice(best + bestKey.length); var span = document.createElement('span'); span.className = 'term'; span.tabIndex = 0; span.setAttribute('data-tip', TERMS[bestKey]); span.textContent = bestKey; var frag = document.createDocumentFragment(); if (before) frag.appendChild(document.createTextNode(before)); frag.appendChild(span); if (after) frag.appendChild(document.createTextNode(after)); node.parentNode.replaceChild(frag, node); seen[bestKey] = true; }); }

  window.addEventListener('load', function(){ setCur(activeId()); setupProgress(); linkifyTerms(); });
</script>
</body>
</html>
